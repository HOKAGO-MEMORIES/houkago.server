spring:
  application:
    name: houkago.server
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

houkago:
  posts:
    checkout-path: ${HOUKAGO_POSTS_CHECKOUT_PATH:}
